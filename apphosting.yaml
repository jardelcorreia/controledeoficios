# Settings to manage and configure a Firebase App Hosting backend.
# https://firebase.google.com/docs/app-hosting/configure

runConfig:
  # Increase this value if you'd like to automatically spin up
  # more instances in response to increased traffic.
  maxInstances: 1
# Environment variables are accessible by both your framework and Cloud Functions.
# Secret variables are only accessible by your framework.
# https://firebase.google.com/docs/app-hosting/configure-env
env:
  - variable: NEXT_PUBLIC_VAPID_PUBLIC_KEY
    value: YOUR_VAPID_PUBLIC_KEY_HERE
  - variable: VAPID_PRIVATE_KEY
    secret: VAPID_PRIVATE_KEY_SECRET
